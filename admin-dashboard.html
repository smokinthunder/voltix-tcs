<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voltix - Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

<body data-page="admin-dashboard">
  <div id="background-root"></div>
  <div id="navbar-root"></div>

<main class="dashboard-main"><div class="container-xxl"><section class="hero-panel"><div class="row align-items-center g-4"><div class="col-lg-8"><span class="section-kicker">Admin Console</span><h1 class="hero-title">Admin <span class="text-accent">Overview</span></h1></div><div class="col-lg-4"><div class="card-panel quick-summary-card h-100"><div class="card-panel-header"><div><p class="card-label mb-1">Outstanding Value</p><h3 class="card-title mb-0" id="adminOutstandingValue"></h3></div><div class="status-dot warning"></div></div><div class="summary-stack mt-4"><div class="summary-line"><span>Open complaints</span><strong id="adminOpenComplaints"></strong></div></div><a class="btn btn-accent w-100 mt-4" href="admin-complaints.html">Review Complaints</a></div></div></div></section><section class="stats-row"><div class="row g-4"><div class="col-md-6 col-xl-3"><div class="card-panel stat-card"><div class="stat-icon orange"><i class="bi bi-people"></i></div><p class="card-label">Customers</p><h3 class="stat-value" id="adminCustomerCount"></h3></div></div><div class="col-md-6 col-xl-3"><div class="card-panel stat-card"><div class="stat-icon white"><i class="bi bi-receipt"></i></div><p class="card-label">Pending Bills</p><h3 class="stat-value" id="adminPendingBills"></h3></div></div><div class="col-md-6 col-xl-3"><div class="card-panel stat-card"><div class="stat-icon muted"><i class="bi bi-exclamation-circle"></i></div><p class="card-label">Complaints</p><h3 class="stat-value" id="adminComplaintCount"></h3></div></div><div class="col-md-6 col-xl-3"><div class="card-panel stat-card"><div class="stat-icon success"><i class="bi bi-check2-circle"></i></div><p class="card-label">Transactions</p><h3 class="stat-value" id="adminTransactionCount"></h3></div></div></div></section><section class="content-grid"><div class="row g-4"><div class="col-xl-4"><div class="card-panel h-100"><div class="card-panel-header mb-4"><div><p class="card-label mb-1">Recent Complaints</p><h3 class="card-title mb-0">Support queue</h3></div></div><div class="complaints-list" id="adminRecentComplaints"></div></div></div><div class="col-xl-8"><div class="card-panel h-100"><div class="card-panel-header mb-4"><div><p class="card-label mb-1">Recent Payments</p><h3 class="card-title mb-0">Latest transactions</h3></div><div class="page-actions"><a class="btn btn-outline-soft btn-sm-custom" href="admin-bills.html">View Bills</a><a class="btn btn-outline-soft btn-sm-custom" href="admin-customers.html">View Customers</a></div></div><div class="table-responsive history-table-wrap"><table class="table history-table"><thead><tr><th>Sl No</th><th>Transaction ID</th><th>Customer</th><th>Amount</th><th>Date/Time</th></tr></thead><tbody id="adminRecentPayments"></tbody></table></div></div></div></div></section></div></main>

  <div id="footer-root"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/admin-dashboard.js"></script>
