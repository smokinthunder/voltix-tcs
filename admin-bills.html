<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voltix - Admin Bills</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="assets/css/theme.css" />
</head>
<body data-page="admin-bills">
  <div id="background-root"></div>
  <div id="navbar-root"></div>

<main class="dashboard-main"><div class="container-xxl"><section class="hero-panel"><span class="section-kicker">Admin - Bills</span><h1 class="hero-title">View all <span class="text-accent">customer bills</span></h1><p class="hero-subtext">Search and filter across bill records to review payment status, due dates, and customer accounts.</p></section><section class="card-panel"><div class="card-panel-header mb-4"><div><p class="card-label mb-1">Bill Records</p><h3 class="card-title mb-0">Administrative bill view</h3></div><span class="kpi-chip" id="adminBillCount"></span></div><div class="row g-4 mb-4"><div class="col-lg-5"><label class="form-label custom-label">Search</label><input id="adminBillSearch" class="form-control custom-input" placeholder="Search by bill number, month, customer name, account number, consumer number"></div><div class="col-lg-3"><label class="form-label custom-label">Status</label><select id="adminBillStatus" class="form-select custom-select"><option value="">All statuses</option><option value="Pending">Pending</option><option value="Overdue">Overdue</option><option value="Paid">Paid</option></select></div></div><div class="table-responsive history-table-wrap"><table class="table history-table"><thead><tr><th>Sl No</th><th>Bill Number</th><th>Customer</th><th>Account No</th><th>Month</th><th>Amount</th><th>Due Date</th><th>Status</th></tr></thead><tbody id="adminBillBody"></tbody></table></div></section></div></main>

  <div id="footer-root"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/admin-bills.js"></script>
</body>
</html>
