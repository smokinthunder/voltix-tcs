<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voltix - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="assets/css/theme.css" />
</head>
<body data-page="login">
  <div id="background-root"></div>
  <div id="navbar-root"></div>

<main class="dashboard-main auth-main"><div class="container-xxl"><section class="card-panel auth-card"><div class="row g-4 align-items-stretch"><div class="col-lg-6"><div class="auth-side h-100"><div><span class="section-kicker">Secure Access</span><h1 class="hero-title">Welcome to <span class="text-accent">Voltix</span></h1></div><div class="mt-5 text-center"><img src="https://illustrations.popsy.co/amber/home-office.svg" alt="Login Illustration" class="img-fluid" style="max-height: 250px;"></div></div></div><div class="col-lg-6"><div class="auth-form-card h-100"><div class="card-panel-header mb-4"><div><p class="card-label mb-1">Login</p><h3 class="card-title mb-0">Portal Sign In</h3></div></div><form id="loginForm"><div class="mb-3"><label class="form-label custom-label" for="userId">User ID</label><input type="text" class="form-control custom-input" id="userId" placeholder="Enter your user ID" /></div><div class="mb-3"><label class="form-label custom-label" for="password">Password</label><input type="password" class="form-control custom-input" id="password" placeholder="Enter your password" /></div><div class="d-grid gap-3 mt-4"><button class="btn btn-accent" type="submit"><i class="bi bi-box-arrow-in-right me-2"></i>Login</button><a class="btn btn-outline-soft" href="register.html"><i class="bi bi-person-plus me-2"></i>Create a customer account</a></div></form></div></div></div></section></div></main>

  <div id="footer-root"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
