<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voltix - Card Payment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="assets/css/theme.css" />
</head>
<body data-page="card-payment">
  <div id="background-root"></div>
  <div id="navbar-root"></div>

<main class="dashboard-main"><div class="container-xxl"><section class="hero-panel"><span class="section-kicker">Card Payment</span><h1 class="hero-title">Enter your <span class="text-accent">card details</span></h1><p class="hero-subtext">Provide your Credit/Debit card information to complete the electricity bill payment.</p></section><section class="content-grid"><div class="row g-4"><div class="col-lg-5"><div class="card-panel h-100"><div class="card-panel-header mb-4"><div><p class="card-label mb-1">Amount</p><h3 class="card-title mb-0" id="cardBillAmount"></h3></div><span class="soft-badge pending-badge" id="cardModeText"></span></div><div class="summary-stack"><div class="summary-line"><span>Payment Method</span><strong id="selectedModeLabel"></strong></div><div class="summary-line"><span>Validation</span><strong>JavaScript only</strong></div><div class="summary-line"><span>Flow</span><strong>Static demo</strong></div></div></div></div><div class="col-lg-7"><div class="card-panel h-100"><div class="card-panel-header mb-4"><div><p class="card-label mb-1">Credit Card</p><h3 class="card-title mb-0">Payment details</h3></div></div><form id="cardPaymentForm"><div class="mb-3"><label class="form-label custom-label">Card No</label><input id="cardNumber" class="form-control custom-input" maxlength="19" placeholder="16 digit card number"></div><div class="mb-3"><label class="form-label custom-label">Card Holder Name</label><input id="cardHolderName" class="form-control custom-input" placeholder="Minimum 10 characters"></div><div class="row g-3"><div class="col-md-6"><label class="form-label custom-label">Expiry Date</label><input id="expiryDate" class="form-control custom-input" placeholder="MM/YY"></div><div class="col-md-6"><label class="form-label custom-label">CVV</label><input id="cvv" class="form-control custom-input" type="password" maxlength="4" placeholder="3 or 4 digits"></div></div><div class="page-actions mt-4"><button class="btn btn-accent" type="submit">Make Payment</button><button class="btn btn-outline-soft" type="button" id="backToSummaryBtn">Back to Summary</button></div></form></div></div></div></section></div></main>

  <div id="footer-root"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/payment.js"></script>
</body>
</html>
