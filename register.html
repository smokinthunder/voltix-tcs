<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voltix - Customer Registration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="assets/css/theme.css" />
</head>
<body data-page="register">
  <div id="background-root"></div>
  <div id="navbar-root"></div>

<main class="dashboard-main"><div class="container-xxl"><section class="hero-panel"><span class="section-kicker">New Customer</span><h1 class="hero-title">User <span class="text-accent">Registration</span></h1></section><section class="card-panel"><div class="card-panel-header mb-4"><div><p class="card-label mb-1">Registration</p><h3 class="card-title mb-0">Customer Registration Form</h3></div><span class="soft-badge progress-badge">US001</span></div><form id="registrationForm"><div class="row g-4"><div class="col-md-6 col-lg-3"><label class="form-label custom-label">Consumer ID</label><input id="consumerId" class="form-control custom-input" maxlength="13" placeholder="13 digit number"></div><div class="col-md-6 col-lg-3"><label class="form-label custom-label">Bill Number</label><input id="billNumber" class="form-control custom-input" maxlength="5" placeholder="Last 5 digits"></div><div class="col-md-6 col-lg-2"><label class="form-label custom-label">Title</label><select id="title" class="form-select custom-select"><option value="">Select</option></select></div><div class="col-md-6 col-lg-4"><label class="form-label custom-label">Customer Name</label><input id="customerName" class="form-control custom-input" maxlength="50" placeholder="Enter your full name"></div><div class="col-md-6"><label class="form-label custom-label">Email</label><input id="email" class="form-control custom-input" type="email" placeholder="name@example.com"></div><div class="col-md-6"><label class="form-label custom-label">Mobile Number</label><div class="row g-3"><div class="col-4"><select id="countryCode" class="form-select custom-select"><option value="">Code</option></select></div><div class="col-8"><input id="mobile" class="form-control custom-input" maxlength="10" placeholder="10 digit mobile number"></div></div></div><div class="col-md-6"><label class="form-label custom-label">User ID</label><input id="regUserId" class="form-control custom-input" minlength="5" maxlength="20" placeholder="Choose a user ID"></div><div class="col-md-3"><label class="form-label custom-label">Password</label><input id="regPassword" class="form-control custom-input" type="password" maxlength="30"></div><div class="col-md-3"><label class="form-label custom-label">Confirm Password</label><input id="confirmPassword" class="form-control custom-input" type="password" maxlength="30"></div></div><div class="page-actions mt-4"><button class="btn btn-accent" type="submit">Register</button><button class="btn btn-outline-soft" type="button" id="resetRegistration">Reset</button><a class="btn btn-outline-soft" href="index.html">Back to Login</a></div></form></section></div></main>

  <div id="footer-root"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/register.js"></script>
</body>
</html>
